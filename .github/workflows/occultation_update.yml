name: 掩星预报数据更新

# 站点部署见 .github/workflows/pages.yml（构建时注入 JSON，不提交 Git）。
# 本工作流仅用于手动发布 Release 备份（可选）。

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  occultation-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc g++ libproj-dev proj-data proj-bin \
            build-essential libopenblas-dev liblapack-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: 检查输入文件
        run: |
          test -f scripts/occultation_predict.py
          test -f assets/traj/Rx-GNSSRO.tle
          test -f assets/traj/trk-GroundStation.gst

      - name: 运行掩星预报脚本
        run: |
          cd scripts
          python occultation_predict.py

      - name: 检查并验证输出文件
        run: |
          for f in occultation_events.json satellite_orbits.json visibility_events.json; do
            test -f "assets/traj/$f" || (echo "missing $f" && exit 1)
            python -m json.tool "assets/traj/$f" > /dev/null
            echo "✓ $f ($(du -h "assets/traj/$f" | cut -f1))"
          done

      - name: 生成 manifest
        run: python scripts/generate_traj_manifest.py

      - name: 上传到 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="occultation-data-latest"
          NOTES="Auto-updated $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          gh release delete "$TAG" -y 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Occultation data (auto-updated)" \
            --notes "$NOTES" \
            assets/traj/manifest.json \
            assets/traj/occultation_events.json \
            assets/traj/satellite_orbits.json \
            assets/traj/visibility_events.json

          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG"

      - name: 触发 Pages 重新部署
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages.yml --ref "${{ github.ref_name }}" -f force_regenerate=true
